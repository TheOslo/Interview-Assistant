<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coding Interview Assistant</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Interview Assistant</h1>
            <p>Submit your logic for brutal, objective evaluation.</p>
        </header>

        <main>
            <form id="evaluation-form">
                <div class="form-group">
                    <label for="problem">Problem Description</label>
                    <textarea id="problem" rows="3" required minlength="10" placeholder="e.g., Reverse a linked list..." spellcheck="false"></textarea>
                </div>

                <div class="form-group">
                    <label for="language">Language</label>
                    <select id="language" required>
                        <option value="python">Python</option>
                        <option value="javascript">JavaScript</option>
                        <option value="java">Java</option>
                        <option value="cpp">C++</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="code">Your Code</label>
                    <textarea id="code" rows="10" required minlength="1" placeholder="Paste your solution here..." spellcheck="false"></textarea>
                </div>

                <button type="submit" id="submit-btn">
                    <span id="btn-text">Evaluate Code</span>
                    <span id="btn-spinner" class="hidden"></span>
                </button>
            </form>

            <div id="status-banner" class="hidden"></div>

            <div id="result-container" class="hidden">
                <h3>Evaluation Result</h3>
                <pre id="result-output"></pre>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
